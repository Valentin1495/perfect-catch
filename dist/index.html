<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport"
    content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <title>퍼펙트 캐치</title>
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      /* Brand */
      --c-brand: #0F6E56;
      --c-brand-dim: rgba(15, 110, 86, .12);
      --c-brand-light: rgba(15, 110, 86, .08);
      --c-accent: #378ADD;
      --c-accent-dim: rgba(55, 138, 221, .12);
      --c-warn: #EF9F27;
      --c-danger: #D85A30;

      /* Surface */
      --c-bg: #EFEEEA;
      --c-surface: #FFFFFF;
      --c-surface-dim: rgba(255, 255, 255, .92);
      --c-surface-sub: #F5F4F0;
      --c-surface-panel: #F8F7F4;
      --c-surface-hud: #1B1F2E;
      --c-border: rgba(0, 0, 0, .06);
      --c-border-light: rgba(0, 0, 0, .04);

      /* Text */
      --c-text-primary: #1A1A1A;
      --c-text-secondary: #6B6B67;
      --c-text-muted: #AFAFAB;
      --c-text-inv: #FFFFFF;
      --c-text-inv-dim: rgba(255, 255, 255, .65);

      /* Radius */
      --r-xs: 6px;
      --r-sm: 10px;
      --r-md: 14px;
      --r-lg: 20px;
      --r-xl: 26px;
      --r-full: 9999px;

      /* Shadow */
      --sh-xs: 0 1px 3px rgba(0, 0, 0, .06);
      --sh-sm: 0 2px 8px rgba(0, 0, 0, .07);
      --sh-md: 0 6px 20px rgba(0, 0, 0, .1);
      --sh-lg: 0 12px 32px rgba(0, 0, 0, .14);
      --sh-ctrl: 0 4px 16px rgba(0, 0, 0, .08);
      --sh-inset: inset 0 1px 2px rgba(0, 0, 0, .06);

      /* Spacing */
      --sp-2xs: 2px;
      --sp-xs: 4px;
      --sp-sm: 8px;
      --sp-md: 12px;
      --sp-lg: 16px;
      --sp-xl: 20px;
      --sp-2xl: 24px;
      --sp-3xl: 32px;

      /* Typography */
      --t-hero: 26px;
      --t-title: 20px;
      --t-lg: 16px;
      --t-md: 14px;
      --t-sm: 12px;
      --t-xs: 10px;
      --t-2xs: 9px;

      /* Safe area with Android fallback */
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --ctrl-bottom-pad: max(36px, calc(var(--safe-bottom) + 24px));

      /* Animation */
      --ease-out: cubic-bezier(0.22, 1, 0.36, 1);
      --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    body {
      background: #05081B;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      width: 100vw;
      min-height: 100dvh;
      overflow-x: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      user-select: none;
      -webkit-user-select: none;
    }

    #app {
      width: 100vw;
      max-width: 100vw;
      background: #05081B;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      position: relative;
      overflow: hidden;
      opacity: 0;
      transition: opacity .12s var(--ease-out), background .12s var(--ease-out);
    }

    body.app-ready {
      background: var(--c-bg);
    }

    body.app-ready #app {
      background: var(--c-surface);
      opacity: 1;
    }

    body.device-tablet {
      padding: 20px;
      align-items: center;
    }

    body.device-tablet #app {
      width: min(100%, 460px);
      max-width: 460px;
      height: min(100dvh - 40px, 980px);
      border-radius: 28px;
      box-shadow: 0 20px 64px rgba(0, 0, 0, .16);
    }

    @media (min-width: 1200px) {
      body.device-tablet #app {
        max-width: 480px;
      }
    }

    /* ============================================
     HUD BAR (Top Condition Bar)
     ============================================ */
    #rule-bar {
      --rule-bar-divider: 2px;
      --rule-bar-base: var(--c-surface-hud);
      padding: calc(var(--safe-top) + 10px) var(--sp-lg) 10px;
      display: flex;
      align-items: center;
      gap: var(--sp-sm);
      position: relative;
      overflow: hidden;
      background: var(--rule-bar-base);
      transition: background .35s var(--ease-out);
    }

    #rule-bar::before {
      content: '';
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      height: var(--rule-bar-divider);
      background: rgba(0, 0, 0, .15);
      pointer-events: none;
    }

    #rule-bar.tint-free {
      --rule-bar-base: #1C1F28;
    }

    #rule-bar.tint-sequence {
      --rule-bar-base: #1E1830;
    }

    #rule-bar.tint-streak {
      --rule-bar-base: #132030;
    }

    #rule-bar.tint-time {
      --rule-bar-base: #281818;
    }

    /* HUD chips — shared pill style */
    .hud-chip,
    #cond-combo-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(255, 255, 255, .09);
      border: 1px solid rgba(255, 255, 255, .07);
      border-radius: var(--r-sm);
      padding: 4px 10px;
      flex-shrink: 0;
    }

    .hud-chip-label,
    #cond-combo-wrap>span:first-child {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.1em;
      color: rgba(255, 255, 255, .45);
      text-transform: uppercase;
    }

    .hud-chip-val,
    #cond-combo-val {
      font-size: 16px;
      font-weight: 900;
      color: #FFFFFF;
      line-height: 1.15;
      font-variant-numeric: tabular-nums;
      text-shadow: 0 1px 1px rgba(0, 0, 0, .18);
    }

    #cond-combo-val {
      color: #F6C65B;
    }

    #cond-combo-wrap {
      transition: background .18s var(--ease-out), border-color .18s var(--ease-out), box-shadow .18s var(--ease-out), transform .18s var(--ease-out);
    }

    #cond-combo-wrap.fever {
      background: rgba(239, 159, 39, .22);
      border-color: rgba(239, 159, 39, .34);
      box-shadow: 0 0 0 1px rgba(239, 159, 39, .08), 0 6px 16px rgba(239, 159, 39, .12);
      transform: translateY(-1px);
    }

    #cond-combo-wrap.fever>span:first-child {
      color: rgba(255, 243, 214, .72);
    }

    #cond-combo-wrap.fever #cond-combo-val {
      color: #FFF3D6;
    }

    .hud-chip-target .hud-chip-val {
      color: #5ecfaa;
    }

    /* Left group: score + target + lives */
    #hud-left {
      display: flex;
      align-items: center;
      gap: var(--sp-sm);
      flex: 1;
      min-width: 0;
    }

    #ui-lives {
      display: flex;
      align-items: center;
      gap: 5px;
    }

    /* Right group: combo + settings */
    #hud-right {
      display: flex;
      align-items: center;
      gap: var(--sp-sm);
    }


    /* Rule flash overlay */
    #rule-flash {
      position: absolute;
      inset: 0;
      background: var(--c-brand);
      color: var(--c-text-inv);
      font-size: var(--t-sm);
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: var(--sp-xs);
      opacity: 0;
      pointer-events: none;
      will-change: transform, opacity;
    }

    /* ============================================
     MISSION PILL (Floating HUD Element)
     ============================================ */
    #mission-pill {
      position: absolute;
      top: 14px;
      right: 14px;
      background: rgba(255, 255, 255, .92);
      border: 1px solid rgba(0, 0, 0, .06);
      border-radius: 16px;
      padding: 9px 12px 8px;
      min-width: 138px;
      max-width: 200px;
      pointer-events: none;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      box-shadow: 0 10px 24px rgba(0, 0, 0, .12);
      z-index: 10;
      transition: opacity .2s, transform .2s var(--ease-out);
    }

    #mission-pill.hidden {
      opacity: 0;
      transform: translateY(-8px);
    }

    .hidden {
      display: none !important;
    }

    #mission-pill.flash {
      animation: mission-flash .45s var(--ease-out);
    }

    @keyframes mission-flash {
      0% {
        background: rgba(15, 110, 86, .15);
        border-color: var(--c-brand);
      }

      60% {
        background: rgba(15, 110, 86, .15);
        border-color: var(--c-brand);
      }

      100% {
        background: rgba(255, 255, 255, .92);
        border-color: rgba(0, 0, 0, .06);
      }
    }

    #mission-desc {
      font-size: var(--t-xs);
      font-weight: 500;
      color: var(--c-text-primary);
      line-height: 1.35;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: var(--sp-xs);
    }

    #mission-bar-track {
      height: 3px;
      background: var(--c-surface-sub);
      border-radius: var(--r-full);
      overflow: hidden;
      margin-bottom: var(--sp-2xs);
    }

    #mission-bar-fill {
      height: 3px;
      width: 0%;
      background: var(--c-brand);
      border-radius: var(--r-full);
      transition: width .12s linear;
    }

    #mission-reward {
      font-size: var(--t-2xs);
      font-weight: 700;
      color: var(--c-brand);
      text-align: right;
      letter-spacing: 0.02em;
    }

    /* ============================================
     PROGRESS BARS
     ============================================ */
    #combo-track {
      display: none;
    }

    #combo-fill {
      display: none;
    }

    #level-progress {
      display: none;
    }

    #level-progress-fill {
      height: 2px;
      width: 0%;
      transition: width .18s linear;
      border-radius: 0 1px 1px 0;
    }

    /* Canvas area */
    #canvas-wrap {
      position: relative;
      width: calc(100% + 2px);
      margin-inline: -1px;
      flex: 1;
      min-height: 0;
      overflow: hidden;
      background: linear-gradient(180deg, #EEECE7 0%, #E8E5DE 100%);
    }

    #gameCanvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    /* ============================================
     UNIFIED OVERLAY SYSTEM
     ============================================ */
    .canvas-overlay,
    #overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: var(--sp-2xl);
      background: rgba(236, 233, 227, 0.62);
      backdrop-filter: blur(10px) saturate(1.04);
      -webkit-backdrop-filter: blur(10px) saturate(1.04);
      z-index: 10;
    }

    .canvas-overlay.hidden,
    #overlay.hidden {
      display: none;
    }

    /* Overlay card container */
    .overlay-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      background: var(--c-surface);
      border-radius: 28px;
      padding: 18px 20px 16px;
      border: 1px solid rgba(255, 255, 255, .45);
      box-shadow: 0 14px 34px rgba(0, 0, 0, .12), 0 3px 12px rgba(0, 0, 0, .05);
      max-width: 314px;
      width: 100%;
    }

    /* Overlay label (small caps badge) */
    .overlay-label {
      font-size: var(--t-xs);
      font-weight: 700;
      color: var(--c-brand);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      background: var(--c-brand-dim);
      padding: 3px 10px;
      border-radius: var(--r-full);
    }

    /* Overlay title */
    .overlay-title,
    #overlay-title {
      font-size: 28px;
      font-weight: 900;
      color: var(--c-text-primary);
      letter-spacing: -0.03em;
      text-align: center;
      line-height: 1.1;
    }

    /* Overlay subtitle / description */
    .overlay-sub,
    #overlay-sub {
      font-size: 13px;
      color: var(--c-text-secondary);
      text-align: center;
      line-height: 1.55;
      max-width: 250px;
    }

    #overlay-scores {
      font-size: var(--t-sm);
      color: var(--c-text-secondary);
      text-align: center;
      line-height: 1.9;
    }

    /* Primary CTA button */
    .overlay-btn,
    #overlay-btn {
      width: 100%;
      max-width: 244px;
      padding: 16px var(--sp-2xl);
      background: var(--c-brand);
      color: var(--c-text-inv);
      border: none;
      border-radius: var(--r-full);
      font-size: var(--t-lg);
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 0.01em;
      transition: transform .12s var(--ease-spring), box-shadow .12s, opacity .12s;
      box-shadow: 0 4px 20px rgba(15, 110, 86, .3), 0 1px 4px rgba(15, 110, 86, .2);
      -webkit-tap-highlight-color: transparent;
    }

    .overlay-btn:active,
    #overlay-btn:active {
      transform: scale(0.95);
      opacity: .92;
      box-shadow: 0 2px 10px rgba(15, 110, 86, .2);
    }

    /* Ghost / secondary button */
    .overlay-btn-ghost {
      width: 100%;
      max-width: 244px;
      padding: 13px var(--sp-2xl);
      background: rgba(255, 255, 255, .82);
      color: #8A867F;
      border: 1.5px solid rgba(0, 0, 0, .06);
      border-radius: var(--r-full);
      font-size: var(--t-sm);
      font-weight: 600;
      cursor: pointer;
      transition: background .12s, border-color .12s, transform .12s var(--ease-spring);
      -webkit-tap-highlight-color: transparent;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, .55);
    }

    .overlay-btn-ghost:active {
      background: var(--c-surface-sub);
      transform: scale(0.97);
    }

    #retry-reward-btn:not(:disabled) {
      background: linear-gradient(180deg, rgba(29, 158, 117, .16) 0%, rgba(29, 158, 117, .08) 100%);
      color: #146A51;
      border-color: rgba(29, 158, 117, .35);
      box-shadow: 0 8px 18px rgba(29, 158, 117, .12), inset 0 1px 0 rgba(255, 255, 255, .65);
      font-weight: 700;
    }

    #retry-reward-btn:not(:disabled):active {
      background: linear-gradient(180deg, rgba(29, 158, 117, .22) 0%, rgba(29, 158, 117, .12) 100%);
      border-color: rgba(29, 158, 117, .48);
    }

    /* Button group */
    .overlay-btns {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      width: 100%;
      margin-top: var(--sp-sm);
    }

    /* Mechanic chips inside overlays */
    .mech-chips {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: var(--sp-xs);
      padding: 0;
    }

    .mech-chip {
      font-size: var(--t-xs);
      font-weight: 600;
      padding: 3px var(--sp-sm);
      border-radius: var(--r-full);
      background: var(--c-surface-sub);
      color: var(--c-text-secondary);
      border: 1px solid rgba(0, 0, 0, .06);
    }

    /* Divider inside overlay card */
    .overlay-divider {
      width: 100%;
      height: 1px;
      background: var(--c-surface-sub);
      margin: var(--sp-xs) 0;
    }

    /* Progress bar (retry screen) */
    .prog-track {
      width: 100%;
      max-width: 200px;
      height: 5px;
      background: var(--c-surface-sub);
      border-radius: var(--r-full);
      overflow: hidden;
    }

    .prog-fill {
      height: 5px;
      background: var(--c-brand);
      border-radius: var(--r-full);
      transition: width .3s var(--ease-out);
    }

    /* Star rating */
    .stars {
      font-size: 28px;
      letter-spacing: 4px;
    }

    /* Countdown number */
    .overlay-countdown {
      font-size: 56px;
      font-weight: 900;
      color: var(--c-brand);
      line-height: 1;
      letter-spacing: -0.04em;
    }

    /* Level intro meta row (theme · target) */
    .intro-meta {
      display: flex;
      align-items: center;
      gap: var(--sp-xs);
      font-size: 13px;
      color: #6E6A63;
      font-weight: 700;
      letter-spacing: -0.01em;
    }

    .intro-meta-sep {
      opacity: .55;
    }

    #fever-track,
    #fever-track.active {
      display: none !important;
    }

    /* ============================================
     CONTROLS — Bottom Control Panel
     ============================================ */
    #controls {
      display: flex;
      flex-direction: column;
      gap: var(--sp-xs);
      flex-shrink: 0;
      background: linear-gradient(180deg, rgba(244, 242, 238, .94) 0%, rgba(240, 239, 235, .98) 100%);
      border-top: 1px solid rgba(0, 0, 0, .04);
      padding: var(--sp-sm) var(--sp-md) var(--ctrl-bottom-pad);
      box-shadow: 0 -14px 34px rgba(0, 0, 0, .05);
    }

    #slow-label {
      display: none;
    }

    /* Layout: [LEFT] [center-stack] [RIGHT] */
    #controls-inner {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      gap: var(--sp-sm);
      align-items: stretch;
      margin-bottom: 6px;
    }

    #controls-safe {
      display: none;
    }

    /* Center stack: SLOW on top, PAUSE below */
    #ctrl-center {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      gap: 10px;
      width: 78px;
    }

    /* SLOW button */
    #slow-btn {
      width: 78px;
      height: 78px;
      flex: none;
      border-radius: 22px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 1px;
      padding: 0;
      background: var(--c-surface);
      border: 2px solid rgba(15, 110, 86, .18);
      cursor: pointer;
      transition: transform .12s var(--ease-spring), background .1s, border-color .15s, box-shadow .15s;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      pointer-events: auto;
      box-shadow: 0 8px 18px rgba(0, 0, 0, .1), 0 1px 3px rgba(0, 0, 0, .04);
    }

    #slow-count {
      font-size: 26px;
      line-height: 1;
      font-weight: 900;
      color: var(--c-brand);
      font-variant-numeric: tabular-nums;
    }

    #slow-caption {
      font-size: 8px;
      font-weight: 700;
      letter-spacing: 0.12em;
      color: var(--c-text-muted);
      text-transform: uppercase;
      margin-top: 1px;
    }

    #slow-btn:active {
      transform: scale(0.93);
      background: var(--c-surface-sub);
      box-shadow: 0 2px 6px rgba(0, 0, 0, .08);
    }

    #slow-btn.active {
      border-color: var(--c-accent);
      background: var(--c-accent-dim);
      animation: slow-btn-pulse .6s var(--ease-out) infinite alternate;
    }

    @keyframes slow-btn-pulse {
      from {
        box-shadow: 0 0 0 0 rgba(55, 138, 221, .4);
      }

      to {
        box-shadow: 0 0 0 8px rgba(55, 138, 221, .0);
      }
    }

    #slow-btn.empty {
      opacity: .38;
      pointer-events: none;
    }

    /* PAUSE button */
    #pause-btn {
      width: 60px;
      height: 28px;
      flex-shrink: 0;
      border: 1px solid rgba(0, 0, 0, .06);
      background: rgba(255, 255, 255, .78);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 999px;
      color: var(--c-text-muted);
      transition: background .1s, color .12s, transform .12s var(--ease-spring);
      padding: 0;
      box-shadow: 0 1px 4px rgba(0, 0, 0, .05);
      -webkit-tap-highlight-color: transparent;
    }

    #pause-btn:active {
      background: #EEEDEA;
      transform: scale(0.92);
      color: var(--c-text-secondary);
    }

    #pause-btn svg {
      width: 12px;
      height: 12px;
      pointer-events: none;
    }

    /* LEFT / RIGHT direction buttons */
    .ctrl-btn {
      min-height: 104px;
      background: linear-gradient(180deg, rgba(255, 255, 255, .98) 0%, rgba(251, 250, 247, .96) 100%);
      border: 1.5px solid rgba(0, 0, 0, .05);
      cursor: pointer;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      transition: transform .09s var(--ease-spring), background .1s, border-color .1s, box-shadow .1s;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      touch-action: none;
      color: var(--c-text-secondary);
      border-radius: 20px;
      box-shadow: 0 6px 14px rgba(0, 0, 0, .07), 0 1px 3px rgba(0, 0, 0, .04);
    }

    .ctrl-btn svg {
      width: 32px;
      height: 32px;
      pointer-events: none;
      opacity: .55;
      transition: opacity .08s;
      stroke-width: 2.5;
    }

    .ctrl-btn:active,
    .ctrl-btn.pressed {
      transform: scale(0.96);
      background: var(--c-brand-light);
      border-color: rgba(15, 110, 86, .25);
      box-shadow: 0 1px 4px rgba(0, 0, 0, .05);
    }

    .ctrl-btn:active svg,
    .ctrl-btn.pressed svg {
      opacity: .85;
      color: var(--c-brand);
    }

    /* Remove LEFT/RIGHT text labels */
    #ctrl-left::after,
    #ctrl-right::after {
      content: none;
    }

    /* ============================================
     LEVEL SELECT SCREEN
     ============================================ */
    #level-select {
      display: none;
      flex-direction: column;
      flex: 1;
      overflow-y: auto;
      padding: calc(var(--safe-top) + var(--sp-sm)) var(--sp-md) var(--sp-2xl);
      background: var(--c-surface);
    }

    #level-select.active {
      display: flex;
    }

    .level-select-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: var(--sp-lg);
    }

    .level-select-header h2 {
      font-size: var(--t-title);
      font-weight: 800;
      color: var(--c-text-primary);
    }

    .level-select-header button {
      font-size: var(--t-sm);
      font-weight: 600;
      padding: var(--sp-xs) var(--sp-lg);
      border: 1.5px solid var(--c-border);
      border-radius: var(--r-full);
      background: var(--c-surface);
      cursor: pointer;
      color: var(--c-text-secondary);
      transition: background .12s, border-color .12s;
      -webkit-tap-highlight-color: transparent;
    }

    .level-select-header button:active {
      background: var(--c-surface-sub);
    }

    .phase-header {
      font-size: var(--t-xs);
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--c-text-muted);
      margin: var(--sp-lg) 0 var(--sp-sm);
    }

    .level-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: var(--sp-sm);
    }

    .lv-card {
      aspect-ratio: 1;
      border-radius: var(--r-md);
      border: 1.5px solid var(--c-border);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: var(--sp-2xs);
      cursor: pointer;
      transition: transform .12s var(--ease-spring), border-color .12s, background .12s, box-shadow .12s;
      position: relative;
      background: var(--c-surface);
    }

    .lv-card:active {
      transform: scale(0.96);
    }

    .lv-card.available:hover {
      border-color: var(--c-brand);
      background: var(--c-brand-light);
    }

    .lv-card.locked {
      background: var(--c-surface-sub);
      cursor: default;
    }

    .lv-card.completed {
      border-color: var(--c-brand);
      background: var(--c-brand-light);
    }

    .lv-card .lv-num {
      font-size: var(--t-lg);
      font-weight: 800;
      color: var(--c-text-primary);
    }

    .lv-card.locked .lv-num {
      color: var(--c-text-muted);
    }

    .lv-card .lv-dot {
      width: 6px;
      height: 6px;
      border-radius: var(--r-full);
    }

    .lv-card .lv-star {
      font-size: var(--t-xs);
    }

    .lv-card .lv-lock {
      font-size: var(--t-md);
      color: var(--c-text-muted);
    }

    /* Theme dot colors */
    .dot-space {
      background: #6366f1;
    }

    .dot-neon {
      background: #ec4899;
    }

    .dot-forest {
      background: #22c55e;
    }

    /* Settings gear button (inside rule-bar) */
    #settings-btn {
      position: relative;
      width: 36px;
      height: 36px;
      border: 1px solid rgba(255, 255, 255, .08);
      background: rgba(255, 255, 255, .08);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: var(--r-full);
      color: rgba(255, 255, 255, .5);
      transition: background .15s var(--ease-out), color .15s, transform .12s var(--ease-spring);
      z-index: 2;
      padding: 0;
      flex-shrink: 0;
      -webkit-tap-highlight-color: transparent;
    }

    #settings-btn:active {
      background: rgba(255, 255, 255, .15);
      color: var(--c-text-inv);
      transform: scale(0.94);
    }

    #settings-btn svg {
      width: 18px;
      height: 18px;
      pointer-events: none;
    }

    /* ============================================
     SETTINGS BOTTOM SHEET
     ============================================ */
    #settings-sheet {
      position: fixed;
      inset: 0;
      z-index: 100;
      display: none;
    }

    #settings-sheet.open {
      display: block;
    }

    #settings-backdrop {
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, .45);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
    }

    #settings-panel {
      position: absolute;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%) translateY(100%);
      width: 100%;
      max-width: 420px;
      background: var(--c-surface);
      border-radius: var(--r-xl) var(--r-xl) 0 0;
      padding: 0 0 var(--safe-bottom);
      transition: transform .32s var(--ease-out);
      box-shadow: var(--sh-lg);
    }

    #settings-sheet.open #settings-panel {
      transform: translateX(-50%) translateY(0);
    }

    body.device-tablet #settings-sheet {
      display: block;
      pointer-events: none;
      opacity: 0;
      transition: opacity .2s var(--ease-out);
    }

    body.device-tablet #settings-sheet.open {
      opacity: 1;
      pointer-events: auto;
    }

    body.device-tablet #settings-panel {
      top: 50%;
      bottom: auto;
      left: 50%;
      width: min(100% - 40px, 440px);
      max-width: 440px;
      max-height: min(78dvh, 680px);
      overflow: auto;
      border-radius: 28px;
      padding: 0;
      transform: translate(-50%, calc(-50% + 28px)) scale(.98);
      transition: transform .24s var(--ease-out), opacity .2s var(--ease-out);
    }

    body.device-tablet #settings-sheet.open #settings-panel {
      transform: translate(-50%, -50%) scale(1);
    }

    body.device-tablet .sheet-handle {
      display: none;
    }

    .sheet-handle {
      width: 36px;
      height: 4px;
      border-radius: var(--r-full);
      background: var(--c-border);
      margin: var(--sp-md) auto var(--sp-xs);
    }

    .sheet-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: var(--sp-sm) var(--sp-xl) var(--sp-md);
      border-bottom: 1px solid var(--c-surface-sub);
    }

    .sheet-header h3 {
      font-size: var(--t-lg);
      font-weight: 700;
      color: var(--c-text-primary);
    }

    .sheet-close {
      width: 30px;
      height: 30px;
      border-radius: var(--r-full);
      border: none;
      background: var(--c-surface-sub);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--c-text-secondary);
      font-size: var(--t-lg);
      transition: background .12s;
      -webkit-tap-highlight-color: transparent;
    }

    .sheet-close:active {
      background: var(--c-border);
    }

    .sheet-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: var(--sp-lg) var(--sp-xl);
      border-bottom: 1px solid var(--c-surface-sub);
    }

    .sheet-row-label {
      font-size: var(--t-md);
      font-weight: 500;
      color: var(--c-text-primary);
    }

    .sheet-row-sub {
      font-size: var(--t-xs);
      color: var(--c-text-muted);
      margin-top: var(--sp-2xs);
    }

    .sheet-action-btn {
      border: none;
      background: linear-gradient(180deg, rgba(29, 158, 117, .08) 0%, rgba(29, 158, 117, .03) 100%);
      width: 100%;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: var(--sp-md);
      text-align: left;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      border-radius: 18px;
      border: 1px solid rgba(29, 158, 117, .16);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, .7), 0 8px 18px rgba(29, 158, 117, .05);
      transition: transform .12s var(--ease-spring), background .12s, border-color .12s, box-shadow .12s;
    }

    .sheet-action-btn:active {
      background: linear-gradient(180deg, rgba(29, 158, 117, .13) 0%, rgba(29, 158, 117, .06) 100%);
      border-color: rgba(29, 158, 117, .28);
      transform: scale(0.985);
    }

    .sheet-action-copy {
      display: flex;
      flex-direction: column;
      min-width: 0;
    }

    .sheet-action-copy .sheet-row-label {
      font-weight: 700;
      color: #156A52;
    }

    .sheet-action-copy .sheet-row-sub {
      color: #8C8B86;
      line-height: 1.35;
    }

    .sheet-action-arrow {
      flex-shrink: 0;
      width: 28px;
      height: 28px;
      border-radius: 999px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: #156A52;
      background: rgba(255, 255, 255, .78);
      border: 1px solid rgba(29, 158, 117, .14);
      font-size: 13px;
      font-weight: 700;
      box-shadow: 0 2px 8px rgba(0, 0, 0, .04);
    }

    /* Toggle switch */
    .toggle-wrap {
      position: relative;
      width: 48px;
      height: 28px;
      flex-shrink: 0;
    }

    .toggle-wrap input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .toggle-track {
      position: absolute;
      inset: 0;
      background: var(--c-text-muted);
      border-radius: var(--r-full);
      cursor: pointer;
      transition: background .2s var(--ease-out);
    }

    .toggle-wrap input:checked+.toggle-track {
      background: var(--c-brand);
    }

    .toggle-thumb {
      position: absolute;
      top: 3px;
      left: 3px;
      width: 22px;
      height: 22px;
      background: var(--c-surface);
      border-radius: var(--r-full);
      box-shadow: var(--sh-xs);
      pointer-events: none;
      transition: left .2s var(--ease-out);
    }

    .toggle-wrap input:checked~.toggle-thumb {
      left: 23px;
    }

    .sheet-danger {
      margin: var(--sp-md) var(--sp-xl) var(--sp-xl);
      padding: var(--sp-md);
      border: 1px solid rgba(216, 90, 48, .2);
      border-radius: var(--r-sm);
      color: var(--c-danger);
      font-size: var(--t-sm);
      font-weight: 600;
      cursor: pointer;
      text-align: center;
      background: rgba(216, 90, 48, .06);
      transition: background .12s;
      -webkit-tap-highlight-color: transparent;
    }

    .sheet-danger:active {
      background: rgba(216, 90, 48, .12);
    }

    .sheet-version {
      font-size: var(--t-xs);
      color: var(--c-text-muted);
      text-align: center;
      padding: var(--sp-xs) 0 var(--sp-lg);
    }

    /* ============================================
     PHASE TABS
     ============================================ */
    #ls-total-stars {
      font-size: var(--t-sm);
      color: var(--c-text-muted);
      font-weight: 500;
    }

    #phase-tabs {
      display: flex;
      gap: var(--sp-xs);
      margin-bottom: var(--sp-lg);
    }

    .phase-tab {
      flex: 1;
      padding: var(--sp-sm) 0;
      border: 1.5px solid var(--c-border);
      border-radius: var(--r-sm);
      background: var(--c-surface);
      cursor: pointer;
      font-size: var(--t-sm);
      font-weight: 600;
      color: var(--c-text-muted);
      transition: border-color .12s, color .12s, background .12s, transform .1s var(--ease-spring);
      -webkit-tap-highlight-color: transparent;
    }

    .phase-tab:active {
      transform: scale(0.97);
    }

    .phase-tab.active {
      border-color: var(--c-brand);
      color: var(--c-brand);
      background: var(--c-brand-light);
    }

    .level-grid-5 {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: var(--sp-xs);
    }

    .lv-card .lv-stars-row {
      display: flex;
      gap: 1px;
      margin-top: var(--sp-2xs);
    }

    .lv-card .lv-stars-row span {
      font-size: 8px;
      line-height: 1;
    }

    /* Life icons (hearts) */
    .life-icon {
      width: 16px;
      height: 16px;
      flex-shrink: 0;
      transition: transform .2s var(--ease-spring), opacity .2s;
    }

    .life-icon svg {
      width: 100%;
      height: 100%;
      fill: var(--c-danger);
      filter: drop-shadow(0 1px 3px rgba(216, 90, 48, .4));
    }

    .life-icon.lost {
      opacity: .25;
      transform: scale(0.85);
    }

    .life-icon.lost svg {
      fill: rgba(255, 255, 255, .4);
      filter: none;
    }

    .life-icon.pop {
      animation: life-pop .3s var(--ease-spring);
    }

    @keyframes life-pop {
      0% {
        transform: scale(1);
      }

      30% {
        transform: scale(1.6);
      }

      60% {
        transform: scale(0.8);
      }

      100% {
        transform: scale(0.85);
      }
    }
  </style>
</head>

<body>
  <div id="app">

    <!-- LEVEL SELECT SCREEN (shown/hidden via JS) -->
    <div id="level-select">
      <div class="level-select-header">
        <h2>레벨 선택</h2>
        <div style="display:flex;align-items:center;gap:8px">
          <button id="ls-back-btn">뒤로</button>
        </div>
      </div>
      <div id="phase-tabs">
        <button class="phase-tab active" data-phase="0">입문</button>
        <button class="phase-tab" data-phase="1">적응</button>
        <button class="phase-tab" data-phase="2">심화</button>
        <button class="phase-tab" data-phase="3">마스터</button>
      </div>
      <div id="level-grid-container"><!-- JS renders cards here --></div>
    </div>

    <!-- GAME UI (hidden while level-select shown) -->
    <div id="game-ui" style="display:flex;flex-direction:column;flex:1;min-height:0;">

      <!-- 1. HUD bar -->
      <div id="rule-bar">
        <div id="hud-left">
          <div class="hud-chip">
            <span class="hud-chip-label">점수</span>
            <span class="hud-chip-val" id="ui-score">0</span>
          </div>
          <div class="hud-chip hud-chip-target">
            <span class="hud-chip-label">목표</span>
            <span class="hud-chip-val" id="ui-target">0</span>
          </div>
          <div id="cond-combo-wrap">
            <span>콤보</span>
            <span id="cond-combo-val">0</span>
          </div>
        </div>
        <div id="hud-right">
          <div id="ui-lives"></div>
        </div>
        <button id="settings-btn" aria-label="설정">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
            stroke-linejoin="round">
            <circle cx="12" cy="12" r="3" />
            <path
              d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z" />
          </svg>
        </button>
        <div id="rule-flash"></div>
      </div>

      <!-- Hidden elements kept for JS compatibility -->
      <div id="fever-track" style="display:none">
        <div id="fever-fill"></div>
        <div id="fever-label"></div>
      </div>
      <span id="ui-combo" style="display:none">0</span>

      <!-- Hidden elements kept for JS compatibility -->
      <div id="combo-track" style="display:none">
        <div id="combo-fill"></div>
      </div>
      <div id="level-progress" style="display:none">
        <div id="level-progress-fill"></div>
      </div>

      <!-- 4. Game canvas -->
      <div id="canvas-wrap">
        <canvas id="gameCanvas"></canvas>

        <!-- Mission pill (top-right of canvas) -->
        <div id="mission-pill" class="hidden">
          <div id="mission-desc">—</div>
          <div id="mission-bar-track">
            <div id="mission-bar-fill"></div>
          </div>
          <div id="mission-reward">+0</div>
        </div>

        <!-- Level intro overlay (1.5 s) -->
        <div id="intro-overlay" class="canvas-overlay hidden">
          <div class="overlay-card">
            <div class="overlay-label" id="intro-lv"></div>
            <div class="overlay-title" id="intro-title"></div>
            <div class="intro-meta">
              <span id="intro-theme"></span>
              <span class="intro-meta-sep">·</span>
              <span id="intro-target"></span>
            </div>
            <div id="intro-mechs" class="mech-chips"></div>
            <div class="overlay-countdown" id="intro-countdown"></div>
          </div>
        </div>

        <!-- Level clear overlay -->
        <div id="clear-overlay" class="canvas-overlay hidden">
          <div class="overlay-card">
            <div class="overlay-label">Level Clear!</div>
            <div class="overlay-title" id="clear-lv"></div>
            <div class="overlay-sub" id="clear-score"></div>
            <div class="overlay-btns">
              <button id="clear-next-btn" class="overlay-btn">다음 레벨 →</button>
              <button id="clear-select-btn" class="overlay-btn-ghost">레벨 선택</button>
            </div>
          </div>
        </div>

        <!-- Retry / game-over overlay -->
        <div id="retry-overlay" class="canvas-overlay hidden">
          <div class="overlay-card">
            <div class="overlay-title">게임 오버</div>
            <div class="overlay-sub" id="retry-score"></div>
            <div class="prog-track">
              <div class="prog-fill" id="retry-prog"></div>
            </div>
            <div class="overlay-sub" id="retry-pct" style="font-size:12px;color:#7A756D;font-weight:700"></div>
            <div class="overlay-btns">
              <button id="retry-btn" class="overlay-btn">다시 시도</button>
              <button id="retry-reward-btn" class="overlay-btn-ghost hidden">광고 보고 생명 +1</button>
              <button id="retry-sel-btn" class="overlay-btn-ghost">레벨 선택</button>
            </div>
          </div>
        </div>

        <!-- Pause overlay -->
        <div id="pause-overlay" class="canvas-overlay hidden">
          <div class="overlay-card">
            <div class="overlay-label">Paused</div>
            <div class="overlay-title">일시 정지</div>
            <div class="overlay-sub">현재 진행 상태를 그대로 유지한 채 멈췄습니다.</div>
            <div class="overlay-btns">
              <button id="pause-resume-btn" class="overlay-btn">이어하기</button>
            </div>
          </div>
        </div>

        <!-- Start overlay (first boot) -->
        <div id="overlay">
          <div class="overlay-card">
            <div class="overlay-label">캐주얼 아케이드</div>
            <div id="overlay-title" class="overlay-title">퍼펙트 캐치</div>
            <div id="overlay-sub" class="overlay-sub">떨어지는 오브젝트를 최대한 모으세요.<br>놓치면 목숨이 줄고, 콤보를 쌓으면 점수가 폭등합니다.</div>
            <div id="overlay-scores"></div>
            <div class="overlay-btns">
              <button id="overlay-btn" class="overlay-btn">시작하기</button>
              <button id="overlay-select-btn" class="overlay-btn-ghost">레벨 선택</button>
            </div>
          </div>
        </div>
      </div>

      <!-- Controls: [LEFT] [SLOW / PAUSE] [RIGHT] -->
      <div id="controls">
        <div id="controls-inner">
          <button class="ctrl-btn" id="ctrl-left" aria-label="Left">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
              stroke-linejoin="round">
              <polyline points="15 18 9 12 15 6" />
            </svg>
          </button>
          <div id="ctrl-center">
            <button id="slow-btn" aria-label="슬로우 스킬 사용">
              <span id="slow-count">2</span>
              <span id="slow-caption">SLOW</span>
            </button>
            <button id="pause-btn" aria-label="일시정지">
              <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
                <rect x="7" y="5" width="4" height="14" rx="1"></rect>
                <rect x="13" y="5" width="4" height="14" rx="1"></rect>
              </svg>
            </button>
          </div>
          <button class="ctrl-btn" id="ctrl-right" aria-label="Right">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
              stroke-linejoin="round">
              <polyline points="9 18 15 12 9 6" />
            </svg>
          </button>
        </div>
        <div id="controls-safe"></div>
      </div>

    </div><!-- #game-ui -->
  </div><!-- #app -->

  <!-- SETTINGS BOTTOM SHEET (portal, outside #app) -->
  <div id="settings-sheet">
    <div id="settings-backdrop"></div>
    <div id="settings-panel">
      <div class="sheet-handle"></div>
      <div class="sheet-header">
        <h3>설정</h3>
        <button class="sheet-close" id="settings-close">×</button>
      </div>
      <div class="sheet-row">
        <div>
          <div class="sheet-row-label">효과음</div>
          <div class="sheet-row-sub">충돌 및 피드백 사운드</div>
        </div>
        <label class="toggle-wrap">
          <input type="checkbox" id="sfx-toggle" checked>
          <div class="toggle-track"></div>
          <div class="toggle-thumb"></div>
        </label>
      </div>
      <div class="sheet-row">
        <div>
          <div class="sheet-row-label">진동</div>
          <div class="sheet-row-sub">햅틱 피드백</div>
        </div>
        <label class="toggle-wrap">
          <input type="checkbox" id="vibration-toggle" checked>
          <div class="toggle-track"></div>
          <div class="toggle-thumb"></div>
        </label>
      </div>
      <div class="sheet-row" id="remove-ads-row">

      // iOS WKWebView suspends AudioContext until a user gesture — resume on each call

    function playSound(type) {
      if (!save.settings.sfxEnabled) return;
      const ctx = _getAudioCtx();
      if (!ctx) return;
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain);
      gain.connect(ctx.destination);
      const now = ctx.currentTime;
      if (type === 'catch') {
        osc.type = 'sine';
        osc.frequency.setValueAtTime(880, now);
        osc.frequency.exponentialRampToValueAtTime(1200, now + 0.08);
        gain.gain.setValueAtTime(0.25, now);
        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.12);
        osc.start(now);
        osc.stop(now + 0.12);
      } else if (type === 'combo') {
        osc.type = 'square';
        osc.frequency.setValueAtTime(660, now);
        osc.frequency.exponentialRampToValueAtTime(1000, now + 0.1);
        gain.gain.setValueAtTime(0.2, now);
        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.15);
        osc.start(now);
        osc.stop(now + 0.15);
      } else if (type === 'fever') {
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(440, now);
        osc.frequency.exponentialRampToValueAtTime(880, now + 0.2);
        gain.gain.setValueAtTime(0.3, now);
        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.25);
        osc.start(now);
        osc.stop(now + 0.25);
      } else if (type === 'miss') {
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(300, now);
        osc.frequency.exponentialRampToValueAtTime(100, now + 0.15);
        gain.gain.setValueAtTime(0.25, now);
        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.18);
        osc.start(now);
        osc.stop(now + 0.18);

        osc.frequency.setValueAtTime(400, now);
        osc.frequency.exponentialRampToValueAtTime(80, now + 0.4);
        gain.gain.setValueAtTime(0.3, now);
